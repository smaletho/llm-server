model_name: "/workspace/models/mistral-7b-gguf/mistral-7b-instruct-v0.1.Q4_K_M.gguf"

# GPU configuration
device:
  gpu_id: 0  # GPU device ID
  n_gpu_layers: -1  # -1 means offload all layers to GPU
  gpu_memory_utilization: 0.8  # Maximum GPU memory to use (80%)

# Model configuration
model:
  context_length: 2048
  max_batch_size: 1
  max_tokens: 150
  temperature: 0.7

# Memory management
memory:
  max_ram_utilization: 0.9  # Maximum system RAM to use (90%)
  garbage_collection_threshold: 0.85  # Trigger GC when memory usage exceeds 85%

api:
  host: "0.0.0.0"
  port: 8000
  timeout: 30  # Request timeout in seconds
  max_concurrent_requests: 1  # Limit concurrent requests

logging:
  level: "INFO"
  log_dir: "/workspace/logs"
  log_rotation: "1 day"
  max_log_size: "100MB"
